---
# handlers file for roles/log_server
# - name: Restart log_server Service
#   systemd:
#     name: log_server
#     state: restarted
#     daemon_reload: yes
#   become: yes

- name: Restart log_server Service
  ansible.builtin.service:
    name: log_server
    state: restarted
    daemon_reload: yes
  become: yes

- name: Restart Nginx
  ansible.builtin.service:
    name: nginx
    state: restarted
  become: yes